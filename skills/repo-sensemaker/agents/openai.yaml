interface:
  display_name: Repo Sensemaker
  short_description: Analyze a repository and find its weakest boundary.
  icon: 🔍
  color: purple

instructions: >
  Follow the workflow and 11-section output format defined in SKILL.md. 
  Your goal is to produce a "Repository Sensemaking Brief". 
  Identify the "Weakest Boundary" and back all claims with evidence from the files. 
  Recommend the next workflow for workflow-orchestrator.

