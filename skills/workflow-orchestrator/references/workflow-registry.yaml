workflows:
  - id: setup-sensemaking-repo
    display_name: Setup Sensemaking Repo
    status: draft
    purpose: Configure repository agent docs, artifact contracts, execution mode defaults, and downstream skill mappings.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: setup-sensemaking-skills
        step_type: local_execution
        gate: review_setup_plan
      - id: 2
        skill: repo-sensemaker
        step_type: local_execution
        gate: review_repo_brief
      - id: 3
        skill: prompt-handoff
        step_type: local_execution
        gate: review_handoff_prompt

  - id: docs-contract-reconciliation
    display_name: Docs & Contract Reconciliation
    status: beta
    purpose: Resolve drift between documentation, registries, artifact contracts, templates, and validator rules.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: repo-sensemaker
        step_type: local_execution
        gate: review_drift_diagnosis
      - id: 2
        skill: sensemaking-docs-reconciler
        step_type: local_execution
        gate: review_reconciliation_patch
      - id: 3
        skill: prompt-handoff
        step_type: local_execution
        gate: review_next_prompt

  - id: autonomous-sprint-preflight
    display_name: Autonomous Sprint Preflight
    status: draft
    purpose: Verify that a repository is ready for Autonomous Sprint before selecting the sprint workflow.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: repo-sensemaker
        step_type: local_execution
        gate: review_execution_readiness
      - id: 2
        skill: prompt-handoff
        step_type: local_execution
        gate: review_sprint_prompt

  - id: implementation-prompt-chain
    display_name: Implementation Prompt Chain
    status: draft
    purpose: Turn an approved brief or PRD into copy-paste prompts for external implementation skills.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
    steps:
      - id: 1
        skill: prompt-handoff
        step_type: local_execution
        gate: review_prompt_chain

  - id: product-discovery-sprint
    display_name: Product Discovery Sprint
    status: draft
    purpose: Move from vague product fog to a validated opportunity and testable hypothesis.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: persona
        step_type: external_routing
        gate: review_persona
      - id: 2
        skill: discovery
        step_type: external_routing
        gate: review_discovery
      - id: 3
        skill: interview-synthesis
        step_type: external_routing
        gate: review_patterns
      - id: 4
        skill: opportunity-tree
        step_type: external_routing
        gate: review_opportunity_tree
      - id: 5
        skill: hypothesis
        step_type: external_routing
        gate: review_hypothesis

  - id: feature-kickoff-sprint
    display_name: Feature Kickoff Sprint
    status: draft
    purpose: Turn a validated hypothesis into requirements, stories, and acceptance criteria.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: hypothesis
        step_type: external_routing
        gate: review_hypothesis
      - id: 2
        skill: prd
        step_type: external_routing
        gate: review_prd
      - id: 3
        skill: user-stories
        step_type: external_routing
        gate: review_user_stories
      - id: 4
        skill: acceptance-criteria
        step_type: external_routing
        gate: review_acceptance_criteria

  - id: product-strategy-sprint
    display_name: Product Strategy Sprint
    status: draft
    purpose: Turn market and product context into strategy, OKRs, roadmap, and stakeholder update.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: competitive-analysis
        step_type: external_routing
        gate: review_competitive_analysis
      - id: 2
        skill: strategy
        step_type: external_routing
        gate: review_strategy
      - id: 3
        skill: okr
        step_type: external_routing
        gate: review_okrs
      - id: 4
        skill: roadmap
        step_type: external_routing
        gate: review_roadmap
      - id: 5
        skill: stakeholder-update
        step_type: external_routing
        gate: review_stakeholder_update

  - id: product-autonomous-sprint
    display_name: Product Autonomous Sprint (Drafting)
    status: draft
    purpose: Generate a full proposed product artifact chain from product fog to implementation-ready handoff.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
    decision_policy:
      business_decisions_are: proposed_until_approved
    requires_run_log: true
    steps:
      - id: 1
        skill: persona
        step_type: local_execution
        gate: review_persona
      - id: 2
        skill: discovery
        step_type: local_execution
        gate: review_discovery
      - id: 3
        skill: opportunity-tree
        step_type: local_execution
        gate: review_opportunity_tree
      - id: 4
        skill: hypothesis
        step_type: local_execution
        gate: review_hypothesis
      - id: 5
        skill: prd
        step_type: local_execution
        gate: review_prd
      - id: 6
        skill: user-stories
        step_type: local_execution
        gate: review_user_stories
      - id: 7
        skill: acceptance-criteria
        step_type: local_execution
        gate: review_acceptance_criteria
      - id: 8
        skill: prompt-handoff
        step_type: local_execution
        gate: review_implementation_handoff

  - id: full-local-sensemaking
    display_name: Full Local Sensemaking
    status: beta
    purpose: Convert raw fog into a repository diagnosis and downstream handoff using only local executable skills.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
      - yolo_execution
    requires_clean_worktree: true
    requires_run_log: true
    branch_policy:
      required: true
      pattern: "yolo/{workflow_id}/{timestamp}"
    steps:
      - id: 1
        skill: problem-framer
        step_type: local_execution
        gate: review_problem_frame
      - id: 2
        skill: unknowns-mapper
        step_type: local_execution
        gate: review_unknowns_map
      - id: 3
        skill: repo-sensemaker
        step_type: local_execution
        gate: review_sensemaking_brief
      - id: 4
        skill: prompt-handoff
        step_type: local_execution
        gate: review_final_prompt

  - id: fast-local-diagnostic
    display_name: Fast Local Diagnostic
    status: beta
    purpose: Quickly identify the weakest boundary and produce a handoff prompt.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
      - yolo_execution
    requires_run_log: true
    branch_policy:
      required: true
      pattern: "yolo/{workflow_id}/{timestamp}"
    steps:
      - id: 1
        skill: repo-sensemaker
        step_type: local_execution
        gate: review_sensemaking_brief
      - id: 2
        skill: prompt-handoff
        step_type: local_execution
        gate: review_handoff_prompt

  - id: experimental-autonomous-sprint
    display_name: Autonomous Sprint (Experimental)
    status: beta
    purpose: High-velocity execution using Matt Pocock skills.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
    steps:
      - id: 1
        skill: grill-with-docs
        step_type: local_execution
        gate: review_domain_alignment
      - id: 2
        skill: to-prd
        step_type: local_execution
        gate: review_prd
      - id: 3
        skill: to-issues
        step_type: local_execution
        gate: review_issue_list
      - id: 4
        skill: triage
        step_type: local_execution
        gate: review_agent_briefs
      - id: 5
        skill: tdd
        step_type: local_execution
        gate: verify_tests
      - id: 6
        skill: handoff
        step_type: local_execution
        gate: session_close

  - id: spec-recovery
    display_name: Spec Recovery
    status: stable
    purpose: Recover UI specifications from messy existing implementation evidence.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
    steps:
      - id: 1
        skill: ui-surface-inventory
        step_type: local_execution
        gate: review_inventory
      - id: 2
        skill: ui-orchestrator
        step_type: local_execution
        gate: review_orchestration
      - id: 3
        skill: ui-brief
        step_type: local_execution
        gate: review_brief
      - id: 4
        skill: ui-visual-calibration
        step_type: local_execution
        gate: review_visual_direction
      - id: 5
        skill: ui-blueprint
        step_type: local_execution
        gate: review_blueprint
      - id: 6
        skill: ui-to-issues
        step_type: local_execution
        gate: review_issues

  - id: spec-recovery-negative-missing-handoff
    display_name: Spec Recovery (Negative - Missing Handoff)
    status: stable
    purpose: Test harness failure when handoff artifacts are missing.
    allowed_execution_modes:
      - plan_only
    steps:
      - id: 1
        skill: ui-surface-inventory
        step_type: local_execution
        gate: review_inventory
      - id: 2
        skill: ui-orchestrator
        step_type: local_execution
        gate: review_orchestration

  - id: core-spec-workflow
    display_name: Core Spec Workflow
    status: draft
    purpose: Formally define and generate the upstream user interface specification from a brief.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
    steps:
      - id: 1
        skill: ui-brief
        step_type: local_execution
        gate: review_brief
      - id: 2
        skill: ui-visual-calibration
        step_type: local_execution
        gate: review_visual_calibration
      - id: 3
        skill: ui-blueprint
        step_type: local_execution
        gate: review_blueprint
      - id: 4
        skill: ui-system
        step_type: local_execution
        gate: review_design_system
      - id: 5
        skill: ui-screen-spec
        step_type: local_execution
        gate: review_screen_spec
      - id: 6
        skill: ui-component-spec
        step_type: local_execution
        gate: review_component_spec
      - id: 7
        skill: ui-microcopy
        step_type: local_execution
        gate: review_microcopy
      - id: 8
        skill: ui-acceptance
        step_type: local_execution
        gate: review_acceptance

  - id: audit-refactor-workflow
    display_name: Audit & Refactor Workflow
    status: draft
    purpose: Audit an existing UI implementation against the spec package and apply structural/semantic corrections.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
      - autonomous_execution
    steps:
      - id: 1
        skill: ui-inspector
        step_type: local_execution
        gate: review_inspector_findings
      - id: 2
        skill: ui-redline
        step_type: local_execution
        gate: review_redline_audit
      - id: 3
        skill: ui-spec-reconcile
        step_type: local_execution
        gate: review_reconciliation
      - id: 4
        skill: ui-docs-sync
        step_type: local_execution
        gate: review_docs_sync

  - id: agent-routing-workflow
    display_name: Full Agent-Routing Workflow
    status: draft
    purpose: Synchronize repository documentation and publish verified specifications to AI agent routing paths.
    allowed_execution_modes:
      - plan_only
      - prompt_chain
      - guided_execution
    steps:
      - id: 1
        skill: ui-docs-sync
        step_type: local_execution
        gate: review_docs_sync
      - id: 2
        skill: ui-agent-routing
        step_type: local_execution
        gate: review_agent_routing
