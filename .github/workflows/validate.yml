name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill validator
        run: python scripts/validate-skill.py

      - name: Smoke test packaging
        run: |
          # Package every skill and verify each ZIP is valid
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            python scripts/package-skill.py "$skill_dir" --output-dir dist --skip-validation
            echo "Checking $skill_name.zip..."
            # Verify status is stripped from every packaged SKILL.md
            ! unzip -p "dist/${skill_name}.zip" SKILL.md | grep "^status:"
          done
          # Spot-check that shared references are bundled for a skill that uses them
          unzip -p dist/ui-visual-calibration.zip SKILL.md | grep "references/vague-language-translator.md"
          ls -R dist

      - name: Smoke test universal agent installer
        run: |
          python scripts/install-agent-skills.py skills/ui-brief \
            --scope project --target scratch/agent-install-test

          # SKILL.md must exist
          test -f scratch/agent-install-test/ui-brief/SKILL.md

          # status must be stripped from the exported frontmatter
          # (only the first frontmatter block — between the first two --- lines)
          awk '/^---/{n++; if(n==2) exit} n==1' \
            scratch/agent-install-test/ui-brief/SKILL.md \
            | (! grep "^status:")

          # If the skill references shared files, they must be bundled locally
          if grep -q "shared/references/" skills/ui-visual-calibration/SKILL.md; then
            python scripts/install-agent-skills.py skills/ui-visual-calibration \
              --scope project --target scratch/agent-install-test
            ls scratch/agent-install-test/ui-visual-calibration/references/
          fi

          # --force flag: re-install over an existing target must succeed
          python scripts/install-agent-skills.py skills/ui-brief \
            --scope project --target scratch/agent-install-test --force
          test -f scratch/agent-install-test/ui-brief/SKILL.md

          # Default (no --force): second install without --force must skip, not error
          python scripts/install-agent-skills.py skills/ui-brief \
            --scope project --target scratch/agent-install-test

      - name: Smoke test Claude Code installer
        run: |
          python scripts/install-claude-code-skill.py skills/ui-brief \
            --scope project --target scratch/claude-install-test

          # SKILL.md must exist
          test -f scratch/claude-install-test/ui-brief/SKILL.md

          # status must be stripped from the exported frontmatter
          awk '/^---/{n++; if(n==2) exit} n==1' \
            scratch/claude-install-test/ui-brief/SKILL.md \
            | (! grep "^status:")
