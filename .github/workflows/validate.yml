name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill validator
        run: python scripts/validate-skill.py

      - name: Smoke test packaging
        run: |
          python scripts/package-skill.py skills/ui-visual-calibration --output-dir dist
          ls -R dist
