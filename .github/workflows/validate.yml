name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate skill structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill validator
        run: python scripts/validate-skill.py

      - name: Smoke test packaging
        run: |
          # Package every skill and verify each ZIP is valid
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            python scripts/package-skill.py "$skill_dir" --output-dir dist --skip-validation
            echo "Checking $skill_name.zip..."
            # Verify status is stripped from every packaged SKILL.md
            ! unzip -p "dist/${skill_name}.zip" SKILL.md | grep "^status:"
          done
          # Spot-check that shared references are bundled for a skill that uses them
          unzip -p dist/ui-visual-calibration.zip SKILL.md | grep "references/vague-language-translator.md"
          ls -R dist
