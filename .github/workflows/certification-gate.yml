name: Skill Certification Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  certification-audit:
    name: Certification Authority Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyyaml
          
      - name: Run Certification Audit
        run: |
          echo ">>> Starting Certification Authority Audit..."
          python scripts/verify_certification_authority.py
        
      - name: Validate Promotion Plan Schema
        run: python scripts/validate-promotion-plan-schema.py
        
      - name: Verify All Active Promotion Evidence
        run: |
          if [ -d "promotion-runs" ]; then
            echo ">>> Validating existing evidence against authoritative contracts..."
            python scripts/run_promotion_suite.py --validate-all-runs
          fi
