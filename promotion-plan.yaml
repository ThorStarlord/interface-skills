# Skill Promotion Plan
# This file defines the test matrix for skills in interface-skills.
# The runner script (scripts/run-promotion-suite.py) uses this to execute tests.

target_repo_fallback: ../metamorfose-edutech

skills:
  ui-spec-linter:
    fixtures:
      - examples/kanban-recovery
      - examples/admin-nav-recovery
      - examples/spec-recovery-create
    messy_fixture: examples/failing-spec-package
    downstream:
      next_skill: ui-spec-reconcile
      fixture: examples/kanban-recovery
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: true
      require_downstream: true

  ui-surface-inventory:
    fixtures:
      - examples/kanban-recovery
      - examples/admin-nav-recovery
      - examples/spec-recovery-create
    messy_fixture: examples/failing-spec-package  # Needs a dedicated messy fixture later
    downstream:
      next_skill: ui-inspector
      fixture: examples/spec-recovery-create
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: true
      require_downstream: true

  ui-brief:
    fixtures:
      - examples/kanban-recovery
      - examples/admin-nav-recovery
      - examples/spec-recovery-create
    messy_fixture: examples/failing-spec-package
    downstream:
      next_skill: ui-visual-calibration
      fixture: examples/spec-recovery-create
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: true
      require_downstream: true


  ui-orchestrator:
    fixtures:
      - examples/orchestrator-states/01-empty
      - examples/orchestrator-states/02-brief-draft
      - examples/orchestrator-states/03-brief-approved
      - examples/orchestrator-states/04-through-blueprint
      - examples/orchestrator-states/05-all-specs-approved
      - examples/orchestrator-states/06-inspector-present
      - examples/orchestrator-states/07-redline-pending
    messy_fixture: examples/failing-spec-package
    promotion_criteria:
      min_good_runs: 7 # All state transitions must be correct
      require_messy_fail: true
      require_downstream: false
