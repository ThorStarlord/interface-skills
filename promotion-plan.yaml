# This file defines the test matrix for skills in interface-skills.
# The runner script (scripts/run-promotion-suite.py) uses this to execute tests.

# NOTE: Legacy fixture paths (e.g. examples/kanban-recovery) were removed because those 
# directories are absent from the current repository state. This is a restoration 
# alignment with existing examples/promotion fixtures, not a promotion criteria change.

target_repo_fallback: ../metamorfose-edutech

skills:
  ui-surface-inventory:
    fixtures:
      - examples/promotion/ui-surface-inventory
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-surface-inventory
      next_skill: ui-inspector
      handoff_mode: real
    behavioral_criteria:
      fixture_family: examples/promotion/ui-surface-inventory
      minimum_behavioral_complexity:
        min_surface_candidates: 3
        require_ambiguous_boundary: true
      blocking_failure_modes:
        - hallucination
        - scope_drift
        - label_friction
        - incomplete_context
        - handoff_failure
        - evidence_gap

  ui-brief:
    fixtures:
      - examples/promotion/ui-blueprint
    messy_fixture: examples/promotion/ui-brief-messy
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: true
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-blueprint
      next_skill: ui-visual-calibration
      handoff_mode: real
    behavioral_criteria:
      fixture_family: examples/promotion
      minimum_behavioral_complexity:
        require_intent_alignment: true
        require_scope_bounding: true
