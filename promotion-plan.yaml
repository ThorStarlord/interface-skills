# This file defines the test matrix for skills in interface-skills.
# The runner script (scripts/run-promotion-suite.py) uses this to execute tests.

# NOTE: Legacy fixture paths (e.g. examples/kanban-recovery) were removed because those 
# directories are absent from the current repository state. This is a restoration 
# alignment with existing examples/promotion fixtures, not a promotion criteria change.

target_repo_fallback: ../metamorfose-edutech

skills:
  ui-surface-inventory:
    fixtures:
      - examples/promotion/ui-surface-inventory
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-surface-inventory
      next_skill: ui-inspector
    behavioral_criteria:
      fixture_family: inventory
      minimum_behavioral_complexity:
        min_surface_candidates: 3
        require_ambiguous_boundary: true
      blocking_failure_modes:
        - hallucination
        - scope_drift
        - label_friction
        - incomplete_context
        - handoff_failure
        - evidence_gap

  ui-brief:
    fixtures:
      - examples/promotion/ui-blueprint
    messy_fixture: examples/promotion/ui-brief-messy
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: true
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-blueprint
      next_skill: ui-visual-calibration
    behavioral_criteria:
      fixture_family: brief_generation
      minimum_behavioral_complexity:
        require_intent_alignment: true
        require_scope_bounding: true
      blocking_failure_modes:
        - hallucination
        - scope_drift
        - label_friction
        - incomplete_context
        - handoff_failure
        - evidence_gap

  ui-flow:
    fixtures:
      - examples/promotion/ui-flow
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: false
    behavioral_criteria:
      fixture_family: flow_generation
      minimum_behavioral_complexity:
        require_navigation_logic: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-blueprint:
    fixtures:
      - examples/promotion/ui-blueprint
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-blueprint
      next_skill: ui-to-issues
    behavioral_criteria:
      fixture_family: blueprint_generation
      minimum_behavioral_complexity:
        require_structural_coherence: true
        require_artifact_links: true
      blocking_failure_modes:
        - hallucination
        - scope_drift
        - label_friction
        - incomplete_context
        - handoff_failure
        - evidence_gap

  ui-system:
    fixtures:
      - examples/promotion/ui-system
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-system
      next_skill: ui-component-spec
    behavioral_criteria:
      fixture_family: system_architecture
      minimum_behavioral_complexity:
        require_component_hierarchy: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-component-spec:
    fixtures:
      - examples/promotion/ui-component-spec
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-component-spec
      next_skill: ui-spec-linter
    behavioral_criteria:
      fixture_family: component_specification
      minimum_behavioral_complexity:
        require_prop_definitions: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-microcopy:
    fixtures:
      - examples/promotion/ui-microcopy
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-microcopy
      next_skill: ui-docs-sync
    behavioral_criteria:
      fixture_family: microcopy_generation
      minimum_behavioral_complexity:
        require_tone_consistency: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-acceptance:
    fixtures:
      - examples/promotion/ui-acceptance
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-acceptance
      next_skill: ui-to-issues
    behavioral_criteria:
      fixture_family: acceptance_criteria
      minimum_behavioral_complexity:
        require_edge_cases: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-spec-linter:
    fixtures:
      - examples/promotion/ui-visual-calibration # Uses a full spec package as fixture
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-visual-calibration
      next_skill: ui-orchestrator
    behavioral_criteria:
      fixture_family: spec_linting
      minimum_behavioral_complexity:
        require_pattern_matching: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-generate-code:
    fixtures:
      - examples/promotion/ui-visual-calibration # Can generate from this
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: false
    behavioral_criteria:
      fixture_family: code_generation
      minimum_behavioral_complexity:
        require_compilation: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-redline:
    fixtures:
      - examples/promotion/ui-redline
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-redline
      next_skill: ui-visual-calibration
    behavioral_criteria:
      fixture_family: redline_generation
      minimum_behavioral_complexity:
        require_pixel_precision: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-docs-sync:
    fixtures:
      - examples/promotion/ui-docs-sync
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: true
    downstream:
      fixture: examples/promotion/ui-docs-sync
      next_skill: ui-orchestrator
    behavioral_criteria:
      fixture_family: documentation_sync
      minimum_behavioral_complexity:
        require_markdown_integrity: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-agent-routing:
    fixtures:
      - examples/promotion/ui-agent-routing
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: false
    behavioral_criteria:
      fixture_family: agent_routing
      minimum_behavioral_complexity:
        require_capability_mapping: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-orchestrator:
    fixtures:
      - examples/promotion/ui-visual-calibration # Can analyze any state
    promotion_criteria:
      min_good_runs: 7
      require_messy_fail: false
      require_downstream: false
    behavioral_criteria:
      fixture_family: orchestration
      minimum_behavioral_complexity:
        require_step_logic: true
      blocking_failure_modes: [hallucination, scope_drift]

  ui-to-issues:
    fixtures:
      - examples/promotion/ui-to-issues
    promotion_criteria:
      min_good_runs: 3
      require_messy_fail: false
      require_downstream: false
    behavioral_criteria:
      fixture_family: issue_generation
      minimum_behavioral_complexity:
        min_findings: 5
        require_mixed_severity: true
        require_prioritization_conflict: true
      blocking_failure_modes:
        - hallucination
        - scope_drift
        - label_friction
        - incomplete_context
        - handoff_failure
        - evidence_gap
